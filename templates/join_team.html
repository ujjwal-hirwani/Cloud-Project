{% extends "base.html" %}
{% block title %}Join Team – TeamUp{% endblock %}
{% block content %}
<div class="container" style="max-width:460px;padding-top:3rem;">
    <div class="page-header">
        <h1>Join a Team</h1>
        <p>For: <strong>{{ hackathon.name }}</strong></p>
    </div>

    {% if message %}
    <div class="alert alert-error">{{ message }}</div>
    {% endif %}

    <div class="card">
        <form method="POST" action="{{ url_for('join_team', hackathon_id=hackathon._id) }}">
            <div class="form-group">
                <label>Team Code</label>
                <input type="text" name="code" required placeholder="e.g. AB3X7Z"
                       style="font-size:1.3rem;letter-spacing:0.2em;text-align:center;text-transform:uppercase;" />
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Join Team</button>
        </form>
    </div>
    <div style="text-align:center;margin-top:1rem;">
        <a href="{{ url_for('hackathon_lobby', hackathon_id=hackathon._id) }}" class="btn btn-outline btn-sm">← Back to Lobby</a>
    </div>
</div>
{% endblock %}
