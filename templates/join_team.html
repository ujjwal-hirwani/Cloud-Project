{% extends "base.html" %}
{% block title %}Join Team — TeamUp{% endblock %}
{% block content %}
<div class="page-sm fade-up">
  <div class="page-header" style="text-align:center;">
    <h1>Join a team</h1>
    <p>Enter the team code for <strong style="color:var(--text);">{{ hackathon.name }}</strong></p>
  </div>

  {% if error %}
  <div class="alert alert-error">
    <span class="alert-icon">⚠</span> {{ error }}
  </div>
  {% endif %}

  <div class="card">
    <form method="POST" action="{{ url_for('join_team', hackathon_id=hackathon._id) }}">
      <div class="form-group" style="margin-bottom:1.5rem;">
        <label for="code">Team code</label>
        <input
          type="text"
          id="code"
          name="code"
          required
          placeholder="e.g. AB3X7Z"
          maxlength="6"
          style="font-family:var(--font-mono);font-size:1.4rem;letter-spacing:0.25em;text-align:center;text-transform:uppercase;"
        />
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Join team</button>
    </form>
  </div>
  <div style="text-align:center;margin-top:1.25rem;">
    <a href="{{ url_for('hackathon_lobby', hackathon_id=hackathon._id) }}" class="btn btn-ghost btn-sm">← Back to lobby</a>
  </div>
</div>
{% endblock %}
