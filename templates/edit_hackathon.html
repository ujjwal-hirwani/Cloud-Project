{% extends "base.html" %}
{% block title %}Edit {{ hackathon.name }} — TeamUp{% endblock %}
{% block content %}
<div class="page-md fade-up">
  <div class="page-header">
    <h1>Edit hackathon</h1>
    <p>Updating <strong style="color:var(--text);">{{ hackathon.name }}</strong></p>
  </div>

  <div class="card">
    <form method="POST" action="{{ url_for('edit_hackathon', hackathon_id=hackathon._id) }}">
      <div class="form-group">
        <label for="name">Event name</label>
        <input type="text" id="name" name="name" required value="{{ hackathon.name }}" />
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description">{{ hackathon.description }}</textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="start_date">Start date</label>
          <input type="date" id="start_date" name="start_date" value="{{ hackathon.start_date or '' }}" />
        </div>
        <div class="form-group">
          <label for="end_date">End date</label>
          <input type="date" id="end_date" name="end_date" value="{{ hackathon.end_date or '' }}" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="max_team_size">Max team size</label>
          <input type="number" id="max_team_size" name="max_team_size" value="{{ hackathon.max_team_size or 0 }}" min="0" max="20" />
        </div>
        <div class="form-group">
          <label for="status">Status</label>
          <select id="status" name="status">
            <option value="draft" {% if hackathon.status == 'draft' %}selected{% endif %}>Draft</option>
            <option value="open" {% if hackathon.status == 'open' %}selected{% endif %}>Open</option>
            <option value="closed" {% if hackathon.status == 'closed' %}selected{% endif %}>Closed</option>
          </select>
        </div>
      </div>
      <div class="flex-center gap-1" style="margin-top:0.5rem;">
        <button type="submit" class="btn btn-primary">Save changes</button>
        <a href="{{ url_for('organizer_hackathon_detail', hackathon_id=hackathon._id) }}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>

  <div class="danger-zone">
    <h4>Danger zone</h4>
    <p>Permanently deletes this hackathon, all teams, and all uploaded files. This cannot be undone.</p>
    <form method="POST" action="{{ url_for('delete_hackathon', hackathon_id=hackathon._id) }}"
          onsubmit="return confirm('This will permanently delete the hackathon and ALL data. Type OK to confirm.') && prompt('Type DELETE to confirm') === 'DELETE';">
      <button type="submit" class="btn btn-danger">Delete hackathon</button>
    </form>
  </div>
</div>
{% endblock %}
