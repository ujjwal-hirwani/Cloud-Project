{% extends "base.html" %}
{% block title %}Sign in — TeamUp{% endblock %}
{% block content %}
<div class="page-sm fade-up">
  <div class="page-header" style="text-align:center;">
    <h1>Welcome back</h1>
    <p>Sign in to your TeamUp account</p>
  </div>

  {% if error %}
  <div class="alert alert-error">
    <span class="alert-icon">⚠</span> {{ error }}
  </div>
  {% endif %}

  <div class="card">
    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group" style="margin-bottom:1.5rem;">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Sign in</button>
    </form>
  </div>

  <p style="text-align:center;margin-top:1.25rem;font-size:0.82rem;color:var(--text-2);">
    Don't have an account? <a href="{{ url_for('signup') }}" style="color:var(--accent);">Create one</a>
  </p>
</div>
{% endblock %}
