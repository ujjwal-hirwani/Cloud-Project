{% extends "base.html" %}
{% block title %}Login – TeamUp{% endblock %}
{% block content %}
<div class="container" style="max-width:420px;padding-top:3rem;">
    <div class="page-header">
        <h1>Welcome back</h1>
        <p>Log in to your TeamUp account</p>
    </div>

    {% if message %}
    <div class="alert alert-error">{{ message }}</div>
    {% endif %}

    <div class="card">
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="jane@example.com" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="••••••••" />
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Sign In</button>
        </form>
    </div>
    <p style="text-align:center;color:var(--muted);margin-top:1rem;font-size:0.88rem;">
        New here? <a href="{{ url_for('signup') }}" style="color:var(--accent);">Create account</a>
    </p>
</div>
{% endblock %}
