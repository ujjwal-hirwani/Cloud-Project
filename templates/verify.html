{% extends "base.html" %}
{% block title %}Verify email — TeamUp{% endblock %}
{% block content %}
<div class="page-sm fade-up">
  <div class="page-header" style="text-align:center;">
    <h1>Check your inbox</h1>
    <p>We sent a 6-digit code to <strong style="color:var(--text);">{{ email }}</strong></p>
  </div>

  {% if error %}
  <div class="alert alert-error">
    <span class="alert-icon">⚠</span> {{ error }}
  </div>
  {% endif %}

  <div class="card">
    <form method="POST" action="{{ url_for('verify_email', email=email) }}">
      <div class="form-group" style="margin-bottom:1.5rem;">
        <label for="otp">Verification code</label>
        <input
          type="text"
          id="otp"
          name="otp"
          required
          maxlength="6"
          placeholder="000000"
          autocomplete="one-time-code"
          style="font-family:var(--font-mono);font-size:1.6rem;letter-spacing:0.4em;text-align:center;"
        />
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Verify email</button>
    </form>

    <div class="divider"></div>

    <form method="POST" action="{{ url_for('resend_otp', email=email) }}">
      <button type="submit" class="btn btn-ghost btn-block">Resend code</button>
    </form>
  </div>

  <p style="text-align:center;margin-top:1rem;font-size:0.78rem;color:var(--text-3);">
    Code expires after 5 minutes.
  </p>
</div>
{% endblock %}
