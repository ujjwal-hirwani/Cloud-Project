{% extends "base.html" %}
{% block title %}Verify Email – TeamUp{% endblock %}
{% block content %}
<div class="container" style="max-width:420px;padding-top:3rem;">
    <div class="page-header">
        <h1>Verify your email</h1>
        <p>Enter the 6-digit code sent to <strong>{{ email }}</strong></p>
    </div>

    {% if message %}
    <div class="alert {% if 'verified' in message or 'now login' in message %}alert-success{% else %}alert-error{% endif %}">{{ message }}</div>
    {% endif %}

    <div class="card">
        <form method="POST" action="{{ url_for('verify_email', email=email) }}">
            <div class="form-group">
                <label>Verification Code</label>
                <input type="text" name="otp" required maxlength="6" placeholder="000000"
                       style="font-size:1.5rem;letter-spacing:0.3em;text-align:center;" />
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Verify</button>
        </form>
        <hr class="divider" />
        <form method="POST" action="{{ url_for('resend_otp', email=email) }}">
            <button type="submit" class="btn btn-outline" style="width:100%;justify-content:center;">Resend Code</button>
        </form>
    </div>
</div>
{% endblock %}
