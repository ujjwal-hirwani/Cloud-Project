{% extends "base.html" %}
{% block title %}Sign Up – TeamUp{% endblock %}
{% block content %}
<div class="container" style="max-width:480px;padding-top:3rem;">
    <div class="page-header">
        <h1>Create Account</h1>
        <p>Join TeamUp as a participant or organizer</p>
    </div>

    {% if message %}
    <div class="alert alert-error">{{ message }}</div>
    {% endif %}

    <div class="card">
        <form method="POST" action="{{ url_for('signup') }}">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name" required placeholder="Jane" />
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name" required placeholder="Doe" />
                </div>
            </div>
            <div class="form-group">
                <label>Registration / Employee No.</label>
                <input type="text" name="regn_no" required placeholder="REG12345" />
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="jane@example.com" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="••••••••" />
            </div>
            <div class="form-group">
                <label>I am a</label>
                <select name="role">
                    <option value="participant">Participant</option>
                    <option value="organizer">Organizer</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Create Account</button>
        </form>
    </div>
    <p style="text-align:center;color:var(--muted);margin-top:1rem;font-size:0.88rem;">
        Already have an account? <a href="{{ url_for('login') }}" style="color:var(--accent);">Log in</a>
    </p>
</div>
{% endblock %}
