{% extends "base.html" %}
{% block title %}Create account — TeamUp{% endblock %}
{% block content %}
<div class="page-md fade-up" style="padding-top:2.5rem;">
  <div class="page-header" style="text-align:center;">
    <h1>Create your account</h1>
    <p>Join TeamUp as a participant or organizer</p>
  </div>

  {% if error %}
  <div class="alert alert-error">
    <span class="alert-icon">⚠</span> {{ error }}
  </div>
  {% endif %}

  <div class="card">
    <form method="POST" action="{{ url_for('signup') }}">
      <div class="form-row">
        <div class="form-group">
          <label for="first_name">First name</label>
          <input type="text" id="first_name" name="first_name" required placeholder="Jane" />
        </div>
        <div class="form-group">
          <label for="last_name">Last name</label>
          <input type="text" id="last_name" name="last_name" required placeholder="Doe" />
        </div>
      </div>
      <div class="form-group">
        <label for="regn_no">Registration / Employee No.</label>
        <input type="text" id="regn_no" name="regn_no" required placeholder="REG12345" />
      </div>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required placeholder="jane@example.com" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Min. 8 characters" />
      </div>
      <div class="form-group" style="margin-bottom:1.5rem;">
        <label for="role">I am joining as</label>
        <select id="role" name="role">
          <option value="participant">Participant</option>
          <option value="organizer">Organizer</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Create account</button>
    </form>
  </div>

  <p style="text-align:center;margin-top:1.25rem;font-size:0.82rem;color:var(--text-2);">
    Already have an account? <a href="{{ url_for('login') }}" style="color:var(--accent);">Sign in</a>
  </p>
</div>
{% endblock %}
