{% extends "base.html" %}
{% block title %}Admin Login – TeamUp{% endblock %}
{% block content %}
<div class="container" style="max-width:400px;padding-top:3rem;">
    <div class="page-header">
        <h1>Admin Access</h1>
        <p>Super-admin login</p>
    </div>

    {% if message %}
    <div class="alert alert-error">{{ message }}</div>
    {% endif %}

    <div class="card">
        <form method="POST" action="{{ url_for('admin_login') }}">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="admin" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="••••••••" />
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Login as Admin</button>
        </form>
    </div>
</div>
{% endblock %}
