{% extends "base.html" %}
{% block title %}Admin Login — TeamUp{% endblock %}
{% block content %}
<div class="page-sm fade-up">
  <div class="page-header" style="text-align:center;">
    <h1>Admin access</h1>
    <p>Super-administrator login</p>
  </div>

  {% if error %}
  <div class="alert alert-error"><span class="alert-icon">⚠</span> {{ error }}</div>
  {% endif %}

  <div class="card">
    <form method="POST" action="{{ url_for('admin_login') }}">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required placeholder="admin" autocomplete="username" />
      </div>
      <div class="form-group" style="margin-bottom:1.5rem;">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Sign in as admin</button>
    </form>
  </div>
</div>
{% endblock %}
